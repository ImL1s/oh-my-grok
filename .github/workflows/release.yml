name: release-verify

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-verify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install verification tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff mypy
      - name: Version and tag identity
        env:
          RELEASE_REF: ${{ github.ref }}
        run: |
          python - <<'PY'
          import json, os
          from omg_cli import __version__

          plugin = json.load(open("plugin.json", encoding="utf-8"))
          assert plugin["version"] == __version__
          ref = os.environ["RELEASE_REF"]
          if ref.startswith("refs/tags/"):
              assert ref.removeprefix("refs/tags/") == f"v{__version__}"
          print(__version__)
          PY
      - name: Frozen parity and generated checks
        run: |
          python scripts/check_parity_inventory.py
          python scripts/check_traceability.py
          python scripts/check_writer_ownership.py
          python scripts/generate_standalone_hook.py --check
          python scripts/generate_capabilities_lock.py --check
      - name: Tests and static checks
        run: |
          python -m pytest -q -m "not live" --tb=short
          ruff check \
            omg_cli/__init__.py omg_cli/main.py omg_cli/autopilot.py omg_cli/modes.py \
            omg_cli/pipeline.py omg_cli/ralplan.py omg_cli/review.py omg_cli/qa.py \
            omg_cli/guidance.py tests/test_cli_router.py tests/test_autopilot.py \
            tests/test_modes.py tests/test_pipeline.py tests/test_ralplan.py \
            tests/test_review.py tests/test_qa.py tests/test_packaging.py \
            tests/test_docs_cli_drift.py tests/test_release_readback.py
          python -m mypy --follow-imports=skip omg_cli/main.py omg_cli/__init__.py tests/test_release_readback.py
          python -m compileall -q omg_cli
      - name: Hermetic smoke
        run: ./scripts/smoke.sh
        env:
          OMG_E2E: "1"
          OMG_SMOKE_STRICT: "0"
      - name: Publication boundary
        run: |
          echo "Verification only: this workflow does not build, tag, upload, or publish."
          echo "Upload the prebuilt W6 release bundle only after omg parity release-readback."
